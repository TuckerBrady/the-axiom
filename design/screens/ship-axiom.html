<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Axiom — Ship Profile v5b</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void:   #050c14;
    --blue:   #4a9eff;
    --amber:  #f0b429;
    --green:  #4ecb8d;
    --red:    #e05555;
    --copper: #c87941;
    --muted:  #4a6070;
    --star:   #e8f4ff;
    --dim:    #1a2a38;
  }

  html, body { width: 100%; height: 100%; background: #020810; overflow: hidden; }

  .scan {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(74,158,255,.12), transparent);
    animation: scan 6s linear infinite; pointer-events: none; z-index: 100;
  }
  @keyframes scan { from { top: 0; } to { top: 100vh; } }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 99;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
    opacity: .35;
  }

  .screen {
    display: flex; flex-direction: column;
    width: 390px; height: 844px; margin: 0 auto; position: relative;
    background: var(--void); font-family: 'Share Tech Mono', monospace; color: var(--star); overflow: hidden;
  }

  .corner { position: absolute; width: 22px; height: 22px; opacity: 0; animation: show .6s .15s forwards; }
  .corner::before, .corner::after { content: ''; position: absolute; background: rgba(74,158,255,.3); }
  .corner::before { width: 100%; height: 2px; top: 0; left: 0; }
  .corner::after  { width: 2px; height: 100%; top: 0; left: 0; }
  .corner.tl { top: 14px; left: 14px; }
  .corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
  .corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
  .corner.br { bottom: 14px; right: 14px; transform: scale(-1); }
  @keyframes show { to { opacity: 1; } }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 52px 20px 12px; border-bottom: 1px solid rgba(74,158,255,.12);
    flex-shrink: 0; opacity: 0; animation: show .5s .1s forwards;
  }
  .hl { font-size: 10px; letter-spacing: 2.5px; color: var(--muted); }
  .hs { font-size: 10px; letter-spacing: 2px; color: var(--blue); }

  .ship-viewport {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 16px 20px; position: relative;
  }

  .ship-svg {
    width: 356px; height: 260px;
    opacity: 0; animation: shipReveal 2s 0.5s forwards;
    filter: drop-shadow(0 0 30px rgba(74,158,255,.08));
  }
  @keyframes shipReveal {
    0% { opacity: 0; transform: translateX(20px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  @keyframes engineBurn { 0%, 100% { opacity: .6; } 50% { opacity: 1; } }
  @keyframes engineFlicker { 0%, 100% { opacity: .3; } 30% { opacity: .7; } 60% { opacity: .4; } }
  @keyframes relaySeq { 0%, 100% { opacity: .3; } 50% { opacity: .85; } }
  @keyframes cockpitGlow { 0%, 100% { opacity: .15; } 50% { opacity: .4; } }
  @keyframes weldFlicker { 0%, 88%, 100% { opacity: .2; } 92% { opacity: .5; } }
  @keyframes markingGhost { 0%, 82%, 100% { opacity: .05; } 88% { opacity: .15; } }
  @keyframes runLight { 0%, 100% { opacity: .2; } 50% { opacity: .7; } }
  @keyframes ventBreathe { 0%, 100% { opacity: .15; } 50% { opacity: .4; } }
  @keyframes turretScan { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

  .ship-annotations {
    width: 340px; margin-top: 14px;
    opacity: 0; animation: show 1s 2s forwards;
  }
  .annotation {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    border-bottom: 1px solid rgba(74,158,255,.06);
  }
  .annotation:last-child { border-bottom: none; }
  .ann-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .ann-label { font-size: 9px; letter-spacing: 1.5px; color: var(--muted); flex: 1; }
  .ann-value { font-size: 9px; letter-spacing: 1px; text-align: right; }

  .ship-name {
    font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 6px; color: var(--star); text-align: center; margin-top: 18px;
    opacity: 0; animation: show 1s 1.5s forwards;
  }
  .ship-class {
    font-size: 9px; letter-spacing: 3px; color: var(--muted);
    text-align: center; margin-top: 4px; opacity: 0; animation: show 1s 1.8s forwards;
  }

  .status-bar {
    display: flex; justify-content: space-between; padding: 10px 20px 36px;
    border-top: 1px solid rgba(74,158,255,.12);
    font-size: 9px; letter-spacing: 2px; color: var(--muted);
    opacity: 0; animation: show .5s 2.5s forwards;
  }
  .status-bar .val { color: var(--blue); }
  .status-bar .warn { color: var(--amber); }
</style>
</head>
<body>

<div class="scan"></div>
<div class="noise"></div>

<div class="screen">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="header">
    <span class="hl">VESSEL PROFILE</span>
    <span class="hs">THE AXIOM</span>
  </div>

  <div class="ship-viewport">

    <svg class="ship-svg" viewBox="0 0 360 260" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hullMain" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2a3e52"/>
          <stop offset="60%" stop-color="#1a2c3e"/>
          <stop offset="100%" stop-color="#0e1c2a"/>
        </linearGradient>
        <linearGradient id="hullUnder" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#162838"/>
          <stop offset="100%" stop-color="#0a1620"/>
        </linearGradient>
        <linearGradient id="nacelleGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#30475e"/>
          <stop offset="50%" stop-color="#223648"/>
          <stop offset="100%" stop-color="#162838"/>
        </linearGradient>
        <linearGradient id="accentPanel" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3a2820"/>
          <stop offset="100%" stop-color="#281c16"/>
        </linearGradient>
        <linearGradient id="hullLight" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#384e62"/>
          <stop offset="100%" stop-color="#2a3e52"/>
        </linearGradient>
        <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(74,158,255,.25)"/>
          <stop offset="100%" stop-color="rgba(74,158,255,.06)"/>
        </linearGradient>
        <radialGradient id="burnGrad" cx="1" cy=".5" r="1">
          <stop offset="0%" stop-color="rgba(240,180,41,.8)"/>
          <stop offset="35%" stop-color="rgba(200,121,65,.4)"/>
          <stop offset="100%" stop-color="rgba(200,121,65,0)"/>
        </radialGradient>
        <radialGradient id="axmodGrad">
          <stop offset="0%" stop-color="rgba(240,180,41,.35)"/>
          <stop offset="100%" stop-color="rgba(240,180,41,0)"/>
        </radialGradient>
        <radialGradient id="intakeGlow" cx=".5" cy=".5" r=".5">
          <stop offset="0%" stop-color="rgba(74,158,255,.15)"/>
          <stop offset="100%" stop-color="rgba(74,158,255,0)"/>
        </radialGradient>
        <!-- Gun barrel glow -->
        <radialGradient id="muzzleGlow" cx=".5" cy=".5" r=".5">
          <stop offset="0%" stop-color="rgba(224,85,85,.3)"/>
          <stop offset="100%" stop-color="rgba(224,85,85,0)"/>
        </radialGradient>
      </defs>

      <!-- ═══════════════════════════════════════════════════════ -->
      <!-- THE AXIOM v5b — Heavy Scout, Side Profile              -->
      <!-- Ship faces RIGHT. Twin dorsal nacelles, guns visible   -->
      <!-- ═══════════════════════════════════════════════════════ -->


      <!-- ══════════════════════════════════════ -->
      <!--   FAR ENGINE NACELLE (port, behind)    -->
      <!-- ══════════════════════════════════════ -->
      <rect x="38" y="42" width="140" height="26" rx="5"
            fill="#1e3040" stroke="rgba(74,158,255,.18)" stroke-width=".5" opacity=".6"/>
      <!-- Far nacelle exhaust -->
      <rect x="24" y="46" width="14" height="18" rx="2" fill="url(#burnGrad)" opacity=".4"
            style="animation: engineBurn 2s ease-in-out infinite .3s;"/>
      <!-- Far pylon -->
      <polygon points="125,68  135,68  145,100  130,100"
               fill="#162636" stroke="rgba(74,158,255,.12)" stroke-width=".4" opacity=".5"/>


      <!-- ══════════════════════════════════════ -->
      <!--   NEAR ENGINE NACELLE (starboard)      -->
      <!-- ══════════════════════════════════════ -->
      <rect x="37" y="56" width="148" height="32" rx="6"
            fill="url(#nacelleGrad)" stroke="rgba(74,158,255,.35)" stroke-width=".7"/>
      <!-- Nacelle top highlight -->
      <rect x="40" y="57" width="142" height="8" rx="4" fill="rgba(74,158,255,.04)"/>

      <!-- Nacelle panel lines -->
      <line x1="75" y1="57" x2="75" y2="87" stroke="rgba(74,158,255,.15)" stroke-width=".4"/>
      <line x1="110" y1="57" x2="110" y2="87" stroke="rgba(74,158,255,.18)" stroke-width=".5"/>
      <line x1="145" y1="57" x2="145" y2="87" stroke="rgba(74,158,255,.15)" stroke-width=".4"/>
      <line x1="165" y1="57" x2="165" y2="87" stroke="rgba(74,158,255,.12)" stroke-width=".4"/>

      <!-- Nacelle accent panels (rust/brown) -->
      <rect x="80" y="60" width="32" height="24" rx="1"
            fill="url(#accentPanel)" stroke="rgba(200,121,65,.25)" stroke-width=".5"/>
      <rect x="118" y="62" width="20" height="20" rx="1"
            fill="url(#accentPanel)" opacity=".7" stroke="rgba(200,121,65,.18)" stroke-width=".4"/>

      <!-- Nacelle intake (aft face in this orientation) -->
      <ellipse cx="181" cy="72" rx="5" ry="15" fill="rgba(10,20,32,.9)" stroke="rgba(74,158,255,.3)" stroke-width=".6"/>
      <ellipse cx="181" cy="72" rx="3" ry="10" fill="url(#intakeGlow)"/>
      <ellipse cx="181" cy="72" rx="4" ry="12" fill="none" stroke="rgba(74,158,255,.15)" stroke-width=".4"/>

      <!-- Nacelle greebles -->
      <rect x="88" y="64" width="6" height="3" rx=".5" fill="none" stroke="rgba(200,121,65,.2)" stroke-width=".4"/>
      <rect x="96" y="64" width="4" height="3" rx=".5" fill="none" stroke="rgba(200,121,65,.15)" stroke-width=".3"/>
      <rect x="150" y="62" width="12" height="3" rx=".5" fill="rgba(74,158,255,.06)" stroke="rgba(74,158,255,.12)" stroke-width=".3"
            style="animation: ventBreathe 4s ease-in-out infinite;"/>
      <rect x="150" y="78" width="12" height="3" rx=".5" fill="rgba(74,158,255,.06)" stroke="rgba(74,158,255,.12)" stroke-width=".3"
            style="animation: ventBreathe 4s ease-in-out infinite 2s;"/>

      <!-- Nacelle exhaust nozzle -->
      <rect x="32" y="58" width="8" height="28" rx="2" fill="#0a1420" stroke="rgba(200,121,65,.4)" stroke-width=".7"/>
      <!-- Engine burn -->
      <rect x="14" y="60" width="20" height="24" rx="3" fill="url(#burnGrad)"
            style="animation: engineBurn 2s ease-in-out infinite;"/>
      <!-- Heat shimmer -->
      <line x1="5" y1="68" x2="14" y2="68" stroke="rgba(240,180,41,.15)" stroke-width="2.5" stroke-linecap="round"
            style="animation: engineFlicker 1.5s ease-in-out infinite;"/>
      <line x1="7" y1="76" x2="14" y2="76" stroke="rgba(200,121,65,.1)" stroke-width="1.5" stroke-linecap="round"
            style="animation: engineFlicker 1.5s ease-in-out infinite .5s;"/>

      <!-- Nacelle running light -->
      <circle cx="44" cy="58" r="1.5" fill="rgba(224,85,85,.5)" style="animation: runLight 2.5s ease-in-out infinite;"/>


      <!-- ══════════════════════════════════════ -->
      <!--   PYLON (nacelle to hull strut)        -->
      <!-- ══════════════════════════════════════ -->
      <polygon points="130,88  142,88  150,112  135,110"
               fill="#1a2e40" stroke="rgba(74,158,255,.25)" stroke-width=".6"/>
      <line x1="134" y1="94" x2="146" y2="106" stroke="rgba(74,158,255,.12)" stroke-width=".5"/>
      <polygon points="132" y1="90" x2="140" y2="90" x3="148,104" x4="138,106"
               fill="url(#accentPanel)" opacity=".5" stroke="rgba(200,121,65,.12)" stroke-width=".3"/>


      <!-- ══════════════════════════════════════ -->
      <!--   MAIN HULL — ship faces RIGHT         -->
      <!-- ══════════════════════════════════════ -->

      <!-- Hull underside (shadow) -->
      <polygon points="320,148  290,158  195,168  100,166  70,160  70,152  100,154  195,156  290,148"
               fill="url(#hullUnder)" stroke="rgba(74,158,255,.1)" stroke-width=".4"/>

      <!-- Primary hull body -->
      <polygon points="332,140
                        305,118  260,108  200,102  140,100  90,102  70,108
                        70,152  90,158  140,162  200,166  260,160  305,152
                        332,142"
               fill="url(#hullMain)" stroke="rgba(74,158,255,.4)" stroke-width=".8"/>

      <!-- Upper hull bevel -->
      <polygon points="305,118  260,108  200,102  140,100  90,102  70,108
                        70,104  90,98  140,96  200,98  260,104  305,114"
               fill="url(#hullLight)" stroke="rgba(74,158,255,.2)" stroke-width=".4" opacity=".6"/>

      <!-- Hull panel sections with color variation -->
      <!-- Aft panel (lighter) -->
      <polygon points="302,120  260,110  260,156  302,150"
               fill="rgba(56,78,98,.3)" stroke="rgba(74,158,255,.15)" stroke-width=".4"/>

      <!-- Mid-aft accent panel (rust) -->
      <polygon points="258,109  200,103  200,130  258,134"
               fill="url(#accentPanel)" stroke="rgba(200,121,65,.25)" stroke-width=".5"/>

      <!-- Mid-forward panel -->
      <polygon points="198,103  140,100  140,160  198,164"
               fill="rgba(26,44,62,.4)" stroke="rgba(74,158,255,.12)" stroke-width=".4"/>

      <!-- Forward accent panel (rust) -->
      <polygon points="138,101  92,103  92,155  138,158"
               fill="url(#accentPanel)" opacity=".7" stroke="rgba(200,121,65,.2)" stroke-width=".5"/>


      <!-- ── NOSE SECTION ── angular point facing right -->
      <polygon points="352,141  332,140  332,142  352,141"
               fill="#142430" stroke="rgba(74,158,255,.45)" stroke-width=".6"/>
      <polygon points="332,140  320,132  305,118  305,152  320,150  332,142"
               fill="#1e3448" stroke="rgba(74,158,255,.35)" stroke-width=".6"/>
      <!-- Nose running light -->
      <circle cx="348" cy="141" r="2" fill="rgba(74,158,255,.6)">
        <animate attributeName="opacity" values=".3;.8;.3" dur="2.5s" repeatCount="indefinite"/>
      </circle>


      <!-- ══════════════════════════════════════ -->
      <!--   COCKPIT — forward, angular canopy    -->
      <!-- ══════════════════════════════════════ -->
      <polygon points="308,118  278,108  265,108  265,120  300,128"
               fill="url(#glassGrad)" stroke="rgba(74,158,255,.5)" stroke-width=".7"/>
      <!-- Canopy ribs -->
      <line x1="296" y1="115" x2="294" y2="126" stroke="rgba(74,158,255,.3)" stroke-width=".5"/>
      <line x1="285" y1="112" x2="282" y2="122" stroke="rgba(74,158,255,.25)" stroke-width=".5"/>
      <line x1="274" y1="109" x2="272" y2="120" stroke="rgba(74,158,255,.2)" stroke-width=".4"/>
      <!-- Interior glow -->
      <polygon points="304,119  280,110  268,110  268,118  298,126"
               fill="rgba(74,158,255,.05)">
        <animate attributeName="opacity" values=".03;.1;.03" dur="5s" repeatCount="indefinite"/>
      </polygon>


      <!-- ══════════════════════════════════════ -->
      <!--   FORWARD GUNS — chin-mounted twin     -->
      <!-- ══════════════════════════════════════ -->
      <!-- Gun housing (under cockpit, forward) -->
      <rect x="305" y="144" width="22" height="8" rx="2"
            fill="#162636" stroke="rgba(224,85,85,.3)" stroke-width=".6"/>
      <!-- Upper barrel -->
      <line x1="327" y1="146" x2="348" y2="144" stroke="rgba(180,200,220,.5)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="327" y1="146" x2="348" y2="144" stroke="rgba(74,158,255,.15)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Lower barrel -->
      <line x1="327" y1="150" x2="348" y2="148" stroke="rgba(180,200,220,.5)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="327" y1="150" x2="348" y2="148" stroke="rgba(74,158,255,.15)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Muzzle tips -->
      <circle cx="348" cy="144" r="1.5" fill="rgba(224,85,85,.2)"/>
      <circle cx="348" cy="148" r="1.5" fill="rgba(224,85,85,.2)"/>
      <!-- Housing detail -->
      <line x1="312" y1="145" x2="312" y2="151" stroke="rgba(74,158,255,.15)" stroke-width=".4"/>
      <line x1="318" y1="145" x2="318" y2="151" stroke="rgba(74,158,255,.12)" stroke-width=".3"/>


      <!-- ══════════════════════════════════════ -->
      <!--   DORSAL TURRET — rotating mount       -->
      <!-- ══════════════════════════════════════ -->
      <!-- Turret base ring -->
      <ellipse cx="220" cy="98" rx="12" ry="4" fill="#162636" stroke="rgba(74,158,255,.25)" stroke-width=".5"/>
      <!-- Turret housing -->
      <rect x="214" y="88" width="12" height="10" rx="2"
            fill="#1a2e40" stroke="rgba(74,158,255,.3)" stroke-width=".6"/>
      <!-- Twin barrels (pointing forward-right) -->
      <g style="transform-origin: 220px 92px; animation: turretScan 8s ease-in-out infinite;">
        <line x1="226" y1="90" x2="248" y2="86" stroke="rgba(180,200,220,.45)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="226" y1="90" x2="248" y2="86" stroke="rgba(74,158,255,.12)" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="226" y1="94" x2="248" y2="90" stroke="rgba(180,200,220,.45)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="226" y1="94" x2="248" y2="90" stroke="rgba(74,158,255,.12)" stroke-width="2.2" stroke-linecap="round"/>
        <!-- Muzzle glow -->
        <circle cx="248" cy="86" r="2" fill="url(#muzzleGlow)"/>
        <circle cx="248" cy="90" r="2" fill="url(#muzzleGlow)"/>
      </g>
      <!-- Turret top light -->
      <circle cx="220" cy="88" r="1.2" fill="rgba(224,85,85,.4)" style="animation: runLight 3s ease-in-out infinite;"/>


      <!-- ══════════════════════════════════════ -->
      <!--   VENTRAL GUN POD — belly-mounted      -->
      <!-- ══════════════════════════════════════ -->
      <!-- Pod housing -->
      <rect x="155" y="164" width="18" height="7" rx="2"
            fill="#142230" stroke="rgba(224,85,85,.25)" stroke-width=".5"/>
      <!-- Single heavy barrel -->
      <line x1="173" y1="167" x2="195" y2="165" stroke="rgba(180,200,220,.4)" stroke-width="2" stroke-linecap="round"/>
      <line x1="173" y1="167" x2="195" y2="165" stroke="rgba(74,158,255,.1)" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="195" cy="165" r="1.5" fill="rgba(224,85,85,.15)"/>
      <!-- Pod detail lines -->
      <line x1="160" y1="165" x2="160" y2="170" stroke="rgba(74,158,255,.12)" stroke-width=".3"/>
      <line x1="165" y1="165" x2="165" y2="170" stroke="rgba(74,158,255,.1)" stroke-width=".3"/>


      <!-- ══════════════════════════════════════ -->
      <!--   HULL SURFACE DETAIL                  -->
      <!-- ══════════════════════════════════════ -->

      <!-- Hull seam -->
      <line x1="302" y1="136" x2="72" y2="132" stroke="rgba(74,158,255,.1)" stroke-width=".5" stroke-dasharray="8 6"/>

      <!-- Vertical structural ribs -->
      <line x1="260" y1="108" x2="260" y2="158" stroke="rgba(74,158,255,.2)" stroke-width=".6"/>
      <line x1="200" y1="102" x2="200" y2="165" stroke="rgba(74,158,255,.15)" stroke-width=".5"/>
      <line x1="140" y1="100" x2="140" y2="160" stroke="rgba(74,158,255,.18)" stroke-width=".5"/>
      <line x1="90" y1="102" x2="90" y2="156" stroke="rgba(74,158,255,.15)" stroke-width=".5"/>

      <!-- Dorsal vents -->
      <rect x="235" y="106" width="8" height="3" rx=".5" fill="rgba(74,158,255,.08)" stroke="rgba(74,158,255,.18)" stroke-width=".3"
            style="animation: ventBreathe 4s ease-in-out infinite;"/>
      <rect x="245" y="105" width="6" height="3" rx=".5" fill="rgba(74,158,255,.08)" stroke="rgba(74,158,255,.15)" stroke-width=".3"
            style="animation: ventBreathe 4s ease-in-out infinite 1s;"/>

      <!-- Component boxes -->
      <rect x="96" y="106" width="12" height="6" rx=".5" fill="none" stroke="rgba(200,121,65,.2)" stroke-width=".5"/>
      <rect x="96" y="108" width="5" height="4" rx=".3" fill="rgba(200,121,65,.08)"/>
      <rect x="82" y="107" width="8" height="5" rx=".5" fill="none" stroke="rgba(74,158,255,.15)" stroke-width=".4"/>

      <!-- Ventral pipe run -->
      <line x1="275" y1="156" x2="110" y2="164" stroke="rgba(200,121,65,.15)" stroke-width="1.2"/>
      <line x1="275" y1="158" x2="110" y2="166" stroke="rgba(200,121,65,.1)" stroke-width=".6"/>

      <!-- Forward wiring -->
