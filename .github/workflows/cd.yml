name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  eas-update:
    name: EAS OTA Update
    runs-on: ubuntu-latest
    # Only deploy if CI passed — never deploy a broken build.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update
        run: eas update --auto --non-interactive

  eas-build:
    name: EAS Build (on native changes)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && contains(github.event.workflow_run.head_commit.message, '[build]') }}
    needs: eas-update
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build for iOS (preview)
        run: eas build --platform ios --profile preview --non-interactive

      - name: Build for Android (preview)
        run: eas build --platform android --profile preview --non-interactive
